name: Daily Revenue Report

on:
  schedule:
    # 8:00 AM America/Chicago. GitHub cron is UTC; this is 8 AM CST.
    # During daylight saving time, this runs at 9 AM CDT unless adjusted.
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily revenue report
        env:
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
          SHOPIFY_PASSWORD: ${{ secrets.SHOPIFY_PASSWORD }}
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          SHOPIFY_STORE: ${{ vars.SHOPIFY_STORE }}
          META_AD_ACCOUNT: ${{ vars.META_AD_ACCOUNT }}
          REPORT_START_DATE: ${{ vars.REPORT_START_DATE }}
          DAILY_REVENUE_TARGET: ${{ vars.DAILY_REVENUE_TARGET }}
        run: python scripts/daily_revenue_report.py

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/daily_revenue.xlsx data/daily_revenue.csv
          if git diff --staged --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update daily revenue report"
            git push
          fi
